<svg viewBox="0 0 940 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .b{fill:#f1f5f9;stroke:#334155;stroke-width:1.6;}
      .fem{fill:#e0e7ff;stroke:#4338ca;}
      .pair{fill:#dcfce7;stroke:#15803d;}
      .learn{fill:#fce7f3;stroke:#be185d;}
      .t{font-size:18px;font-weight:700;fill:#0f172a;}
      .l{font-size:14px;fill:#0f172a;}
      .s{font-size:11.5px;fill:#475569;}
      .p{fill:none;stroke:#334155;stroke-width:1.6;marker-end:url(#ar2);}
    </style>
  </defs>

  <text x="20" y="32" class="t">Generating the reference dataset (FEM) and the training pairs</text>

  <!-- random sampling -->
  <rect x="20" y="70" width="170" height="110" rx="9" class="b"/>
  <text x="105" y="95" text-anchor="middle" class="l" font-weight="600">Sample random</text>
  <text x="105" y="120" text-anchor="middle" class="s">initial field  T&#8320;(x)</text>
  <text x="105" y="142" text-anchor="middle" class="s">material profile  &#945;(x)</text>
  <text x="105" y="164" text-anchor="middle" class="s">(sines + step edges)</text>

  <!-- FEM solver -->
  <rect x="230" y="70" width="200" height="110" rx="9" class="b fem"/>
  <text x="330" y="94" text-anchor="middle" class="l" font-weight="600">Implicit FEM solver</text>
  <text x="330" y="118" text-anchor="middle" class="s">Backward Euler:</text>
  <text x="330" y="140" text-anchor="middle" class="s">(M + &#916;t·K) T&#8345;&#8330;&#8321; = M·T&#8345;</text>
  <text x="330" y="164" text-anchor="middle" class="s">nonlinear k(x,T) each step</text>

  <!-- trajectory -->
  <rect x="470" y="70" width="180" height="110" rx="9" class="b"/>
  <text x="560" y="94" text-anchor="middle" class="l" font-weight="600">Trajectory</text>
  <text x="560" y="120" text-anchor="middle" class="s">T&#8320;, T&#8321;, T&#8322;, &#8230;, T&#8345;</text>
  <text x="560" y="145" text-anchor="middle" class="s">(20 time steps</text>
  <text x="560" y="163" text-anchor="middle" class="s">× 1000 samples)</text>

  <!-- pairs -->
  <rect x="690" y="70" width="225" height="110" rx="9" class="b pair"/>
  <text x="802" y="94" text-anchor="middle" class="l" font-weight="600">Supervised pairs</text>
  <text x="802" y="122" text-anchor="middle" class="s">input:  ( T&#8345; , &#945; , x )</text>
  <text x="802" y="146" text-anchor="middle" class="s">target: T&#8345;&#8330;&#8321;</text>
  <text x="802" y="168" text-anchor="middle" class="s">train / val / test split</text>

  <path class="p" d="M190,125 L228,125"/>
  <path class="p" d="M430,125 L468,125"/>
  <path class="p" d="M650,125 L688,125"/>

  <!-- learn box -->
  <rect x="260" y="250" width="420" height="100" rx="10" class="b learn"/>
  <text x="470" y="280" text-anchor="middle" class="l" font-weight="700" fill="#9d174d">FNO learns the one-step operator</text>
  <text x="470" y="306" text-anchor="middle" class="s">minimize  MSE( FNO(T&#8345;,&#945;,x) , T&#8345;&#8330;&#8321; )   over all pairs</text>
  <text x="470" y="330" text-anchor="middle" class="s">AdamW · cosine-decayed learning rate</text>
  <path class="p" d="M802,180 C802,230 620,230 600,248"/>
</svg>
