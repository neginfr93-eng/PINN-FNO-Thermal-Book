<svg viewBox="0 0 940 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .b{fill:#f1f5f9;stroke:#334155;stroke-width:1.6;}
      .t{font-size:18px;font-weight:700;fill:#0f172a;}
      .l{font-size:14px;fill:#0f172a;}
      .s{font-size:11.5px;fill:#475569;}
      .p{fill:none;stroke:#334155;stroke-width:1.6;marker-end:url(#a);}
    </style>
  </defs>
  <text x="20" y="30" class="t">One FNO, three training signals — which loss teaches it best?</text>

  <rect x="20" y="150" width="150" height="80" rx="9" class="b"/>
  <text x="95" y="185" text-anchor="middle" class="l" font-weight="600">Same FNO</text>
  <text x="95" y="207" text-anchor="middle" class="s">predicts T&#770;(x)</text>

  <!-- three losses -->
  <rect x="340" y="55" width="270" height="70" rx="9" fill="#fdf6e3" stroke="#b8860b" stroke-width="1.6"/>
  <text x="475" y="82" text-anchor="middle" class="l" font-weight="600" fill="#8a6d00">MSE residual</text>
  <text x="475" y="105" text-anchor="middle" class="s">minimize &#8214; r &#8214;&#178;  (least squares)</text>

  <rect x="340" y="150" width="270" height="80" rx="9" fill="#dcfce7" stroke="#15803d" stroke-width="2.4"/>
  <text x="475" y="178" text-anchor="middle" class="l" font-weight="700" fill="#166534">Weighted residual (FOL)  &#9733;</text>
  <text x="475" y="200" text-anchor="middle" class="s">&#931; T&#770;&#183;r  &#8212;  prediction is the test function</text>
  <text x="475" y="219" text-anchor="middle" class="s">Galerkin projection of the weak form</text>

  <rect x="340" y="255" width="270" height="70" rx="9" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.6"/>
  <text x="475" y="282" text-anchor="middle" class="l" font-weight="600" fill="#991b1b">Data-driven</text>
  <text x="475" y="305" text-anchor="middle" class="s">minimize &#8214; T&#770; &#8722; T&#7584;&#7497;&#7504; &#8214;&#178;  (needs labels)</text>

  <path class="p" d="M170,180 C240,180 250,90 338,90"/>
  <path class="p" d="M170,190 L338,190"/>
  <path class="p" d="M170,200 C240,200 250,290 338,290"/>

  <!-- chosen -->
  <rect x="700" y="150" width="220" height="80" rx="10" fill="#ecfdf5" stroke="#15803d" stroke-width="2.4"/>
  <text x="810" y="180" text-anchor="middle" class="l" font-weight="700" fill="#166534">Chosen: weighted</text>
  <text x="810" y="203" text-anchor="middle" class="s">lowest error, label-free,</text>
  <text x="810" y="221" text-anchor="middle" class="s">best generalization &#8594; used next</text>
  <path class="p" d="M610,190 L698,190"/>

  <text x="20" y="360" class="s">All three train the identical network on the identical data; only the objective differs, isolating the effect of the loss.</text>
</svg>
